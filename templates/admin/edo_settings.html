{% extends "admin/base.html" %}
{% block content %}
<div class="jumbotron">
  <div class="container">
    <h1>Edo — Infrastructure Settings</h1>
    <p class="lead">Runtime knobs for VPN, containers, scoring, and daemon comms.</p>
  </div>
</div>

<div class="container">
  <div id="edo-flash"></div>
  <form id="edo-settings-form">
    <div class="row">
      <div class="col-md-6">
        <h4>Containers</h4>
        <label>Max concurrent containers per team</label>
        <input name="max_containers_per_team" type="number" min="1" class="form-control"
               value="{{ values.max_containers_per_team }}">
        <label>Default container TTL (seconds)</label>
        <input name="container_ttl_seconds" type="number" min="60" class="form-control"
               value="{{ values.container_ttl_seconds }}">
        <label>Extend duration (seconds)</label>
        <input name="extend_seconds" type="number" min="60" class="form-control"
               value="{{ values.extend_seconds }}">
        <label>Extend button unlocks when remaining ≤ (seconds)</label>
        <input name="extend_threshold_seconds" type="number" min="0" class="form-control"
               value="{{ values.extend_threshold_seconds }}">
      </div>
      <div class="col-md-6">
        <h4>Scoring / Rate limiting</h4>
        <label>Submission rate limit (attempts)</label>
        <input name="submit_rate_limit" type="number" min="1" class="form-control"
               value="{{ values.submit_rate_limit }}">
        <label>Submission rate window (seconds)</label>
        <input name="submit_rate_window" type="number" min="1" class="form-control"
               value="{{ values.submit_rate_window }}">

        <h4 class="mt-4">VPN</h4>
        <label>Isolation subnet (CIDR)</label>
        <input name="vpn_subnet" class="form-control" value="{{ values.vpn_subnet }}">
        <label>VPN server public endpoint</label>
        <input name="vpn_server_endpoint" class="form-control"
               value="{{ values.vpn_server_endpoint }}">

        <h4 class="mt-4">Workers</h4>
        <label>TTL sweep interval (seconds)</label>
        <input name="ttl_check_interval_seconds" type="number" min="5" class="form-control"
               value="{{ values.ttl_check_interval_seconds }}">
        <label>Reconciler interval (seconds)</label>
        <input name="reconcile_interval_seconds" type="number" min="10" class="form-control"
               value="{{ values.reconcile_interval_seconds }}">
      </div>
    </div>
    <div class="mt-4">
      <button type="submit" class="btn btn-primary">Save</button>
      <button type="button" id="edo-health" class="btn btn-secondary">Ping daemon</button>
      <button type="button" id="edo-bulk-wg" class="btn btn-info">Generate all VPN peers</button>
    </div>
  </form>

  <hr>
  <h3>Difficulty Legend</h3>
  <div>
    {% for d in difficulties %}
      <span class="badge" style="background:{{ d.color }};color:#fff;margin-right:6px;">
        {{ d.label }}
      </span>
    {% endfor %}
  </div>
</div>

<script>
(function () {
  const form  = document.getElementById("edo-settings-form");
  const flash = document.getElementById("edo-flash");

  function say(msg, ok) {
    flash.innerHTML =
      `<div class="alert alert-${ok ? 'success' : 'danger'}">${msg}</div>`;
  }

  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const data = Object.fromEntries(new FormData(form).entries());
    const res  = await fetch("/plugins/edo/admin/settings", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    const json = await res.json();
    say(json.success ? "Saved." : (json.error || "Save failed."), json.success);
  });

  document.getElementById("edo-health").onclick = async () => {
    const res  = await fetch("/plugins/edo/admin/health");
    const json = await res.json();
    say(json.success ? "Daemon OK." : `Daemon down: ${json.error}`, json.success);
  };

  document.getElementById("edo-bulk-wg").onclick = async () => {
    if (!confirm("Generate WG peers for every user without one?")) return;
    const res = await fetch("/plugins/edo/admin/wg/bulk_generate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ scope: "users" }),
    });
    const json = await res.json();
    say(json.success
        ? `Created ${json.created}, skipped ${json.skipped}, failed ${json.failed}.`
        : (json.error || "Bulk failed."),
        json.success);
  };
})();
</script>
{% endblock %}
