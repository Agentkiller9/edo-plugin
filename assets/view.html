{# Public-facing challenge modal for type=edo. #}
<div class="challenge-desc">
  {{ challenge.html }}
</div>

<div class="edo-meta">
  <span class="edo-difficulty edo-difficulty-{{ challenge.difficulty }}">
    {{ challenge.difficulty|replace('_', ' ')|title }}
  </span>
  <span class="edo-value">{{ challenge.value }} pts</span>
  <span id="edo-progress" class="text-muted small"></span>
</div>

<div id="edo-instance-panel" data-challenge-id="{{ challenge.id }}">
  <div class="edo-instance-status text-muted">Checking instance…</div>
  <button class="btn btn-primary edo-spawn">Spawn instance</button>
  <button class="btn btn-danger  edo-stop"  style="display:none;">Stop</button>
  <button class="btn btn-warning edo-extend" style="display:none;" disabled>Extend</button>
</div>

<form id="edo-submit-form" data-challenge-id="{{ challenge.id }}">
  <div class="form-group">
    <input type="text" name="submission" class="form-control"
           placeholder="Flag..." autocomplete="off" required>
  </div>
  <button class="btn btn-success" type="submit">Submit</button>
  <span class="edo-submit-feedback text-muted"></span>
</form>

<script>
(function () {
  const panel = document.getElementById("edo-instance-panel");
  const chal  = panel.dataset.challengeId;
  const form  = document.getElementById("edo-submit-form");
  const fb    = form.querySelector(".edo-submit-feedback");
  const status = panel.querySelector(".edo-instance-status");
  const spawn  = panel.querySelector(".edo-spawn");
  const stop   = panel.querySelector(".edo-stop");
  const extend = panel.querySelector(".edo-extend");
  const progressEl = document.getElementById("edo-progress");

  let timer = null;

  function render(inst) {
    if (!inst) {
      status.textContent = "No instance running.";
      spawn.style.display  = "";
      stop.style.display   = "none";
      extend.style.display = "none";
      if (timer) { clearInterval(timer); timer = null; }
      return;
    }
    spawn.style.display  = "none";
    stop.style.display   = "";
    extend.style.display = "";
    extend.disabled = !inst.can_extend;

    let remaining = inst.remaining_seconds;
    function firstPort() {
      try {
        const obj = JSON.parse(inst.host_ports || "{}");
        const vals = Object.values(obj);
        return vals.length ? vals[0] : "?";
      } catch (e) {
        return "?";
      }
    }
    function tick() {
      const m = String(Math.floor(remaining / 60)).padStart(2, "0");
      const s = String(remaining % 60).padStart(2, "0");
      status.innerHTML =
        `Endpoint <code>${inst.assigned_ip || "?"}:${firstPort()}</code> · `
        + `${m}:${s} remaining`;
      remaining--;
      if (remaining < 0) refresh();
    }
    tick();
    if (timer) clearInterval(timer);
    timer = setInterval(tick, 1000);
  }

  // CTFd.fetch (not the bare fetch()) auto-attaches the CSRF-Token header
  // CTFd's global before_request hook requires on every POST/PATCH/DELETE.
  async function refresh() {
    const res = await CTFd.fetch("/plugins/edo_plugin/dashboard/data");
    if (!res.ok) return render(null);
    const j = await res.json();
    const inst = (j.instances || []).find(i => String(i.challenge_id) === String(chal));
    render(inst || null);
  }

  async function refreshProgress() {
    const res = await CTFd.fetch(`/plugins/edo_plugin/challenges/${chal}/progress`);
    if (!res.ok) return;
    const j = await res.json();
    if (!j.success || j.flags_total <= 1) {
      progressEl.textContent = "";  // single-flag challenges don't need this
      return;
    }
    progressEl.textContent =
      `· ${j.flags_solved}/${j.flags_total} flags captured (${j.percent_earned}%)`;
  }

  spawn.onclick = async () => {
    spawn.disabled = true;
    const res = await CTFd.fetch(`/plugins/edo_plugin/challenges/${chal}/instance`, {method: "POST"});
    const j = await res.json();
    if (!j.success) alert(j.error + (j.detail ? `: ${j.detail}` : ""));
    spawn.disabled = false;
    refresh();
  };
  stop.onclick = async () => {
    const inst = await currentInstance();
    if (!inst) return;
    await CTFd.fetch(`/plugins/edo_plugin/instances/${inst.id}`, {method: "DELETE"});
    refresh();
  };
  extend.onclick = async () => {
    const inst = await currentInstance();
    if (!inst) return;
    const res = await CTFd.fetch(`/plugins/edo_plugin/instances/${inst.id}/extend`, {method: "POST"});
    const j = await res.json();
    if (!j.success) alert(j.error);
    refresh();
  };

  async function currentInstance() {
    const res = await CTFd.fetch("/plugins/edo_plugin/dashboard/data");
    const j   = await res.json();
    return (j.instances || []).find(i => String(i.challenge_id) === String(chal));
  }

  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    fb.textContent = "…";
    const data = Object.fromEntries(new FormData(form).entries());
    const res  = await CTFd.fetch(`/plugins/edo_plugin/challenges/${chal}/submit`, {
      method: "POST", body: JSON.stringify(data),
    });
    if (res.status === 429) { fb.textContent = "Rate limited — slow down."; return; }
    const j = await res.json();
    fb.textContent = j.message || (j.correct ? "Correct" : "Incorrect");
    fb.className = "edo-submit-feedback " + (j.correct ? "text-success" : "text-danger");
    if (j.correct) refreshProgress();
  });

  refresh();
  refreshProgress();
})();
</script>
